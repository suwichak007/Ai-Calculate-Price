name: Deploy Manday Chatbot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Stop and remove old container
        shell: powershell
        run: |
          docker rm -f manday-chatbot
          exit 0

      - name: Build Docker image
        shell: powershell
        run: |
          docker build -t manday-chatbot .

      - name: Run new container
        shell: powershell
        run: |
          docker run -d `
            --name manday-chatbot `
            --restart unless-stopped `
            -p 8060:8060 `
            --env-file .env `
            manday-chatbot